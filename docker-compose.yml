version: "3.9"

services:
  # MongoDB
  mongodb:
    image: mongo:7
    container_name: prism-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: prism
      MONGO_INITDB_ROOT_PASSWORD: prism_dev_password
      MONGO_INITDB_DATABASE: prism
    volumes:
      - mongodb_data:/data/db
    networks:
      - prism-network

  # Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prism-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb://prism:prism_dev_password@mongodb:27017/prism?authSource=admin
      - CLIENT_URL=http://localhost:5173
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - prism-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: prism-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - VITE_SOCKET_URL=http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - prism-network

networks:
  prism-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
